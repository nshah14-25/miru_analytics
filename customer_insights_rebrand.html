<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Customer Insights — Rebrand</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f9f8f6; color: #1a1a18; padding: 2rem; }
  .dash { max-width: 820px; margin: 0 auto; }
  h1 { font-size: 20px; font-weight: 500; margin-bottom: 4px; }
  .subtitle { font-size: 13px; color: #888780; margin-bottom: 1.5rem; }
  .section-label { font-size: 12px; color: #888780; font-weight: 500; letter-spacing: 0.05em; text-transform: uppercase; margin: 0 0 10px; }
  .cards { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 10px; margin-bottom: 1.5rem; }
  .card { background: #f1efe8; border-radius: 8px; padding: 14px 16px; }
  .card-label { font-size: 12px; color: #5f5e5a; margin: 0 0 4px; }
  .card-val { font-size: 22px; font-weight: 500; color: #1a1a18; margin: 0; }
  .card-delta { font-size: 12px; margin: 4px 0 0; }
  .up { color: #3B6D11; } .down { color: #A32D2D; }
  .tabs { display: flex; gap: 8px; margin-bottom: 1.25rem; }
  .tab { padding: 6px 14px; border-radius: 8px; border: 0.5px solid #b4b2a9; font-size: 13px; cursor: pointer; background: transparent; color: #5f5e5a; font-family: inherit; }
  .tab.active { background: #f1efe8; color: #1a1a18; font-weight: 500; border-color: #888780; }
  .chart-wrap { position: relative; width: 100%; height: 260px; margin-bottom: 1.5rem; }
  .divider { border: none; border-top: 0.5px solid rgba(136,135,128,0.25); margin: 1.5rem 0; }
  .insight-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 0.5rem; }
  .insight-card { background: #fff; border: 0.5px solid rgba(136,135,128,0.3); border-radius: 12px; padding: 14px 16px; }
  .insight-title { font-size: 13px; font-weight: 500; margin: 0 0 6px; color: #1a1a18; }
  .insight-body { font-size: 12px; color: #5f5e5a; margin: 0; line-height: 1.6; }
  .badge { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 6px; margin-bottom: 8px; }
  .badge-warn { background: #FAEEDA; color: #854F0B; }
  .badge-ok { background: #EAF3DE; color: #3B6D11; }
  .legend { display: flex; gap: 16px; margin-bottom: 8px; font-size: 12px; color: #5f5e5a; }
  .legend span { display: flex; align-items: center; gap: 5px; }
  .legend-dot { width: 10px; height: 10px; border-radius: 2px; }
</style>
</head>
<body>
<div class="dash">
  <h1>Customer insights — rebrand</h1>
  <p class="subtitle">Post-rebrand vs pre-rebrand · Brand launch 8 April 2026</p>

  <p class="section-label">Segment</p>
  <div class="tabs">
    <button class="tab active" onclick="setSegment('new')">New customers</button>
    <button class="tab" onclick="setSegment('returning')">Returning customers</button>
  </div>

  <p class="section-label">Post-rebrand snapshot</p>
  <div class="cards" id="stat-cards"></div>

  <div class="legend">
    <span><span class="legend-dot" style="background:#B5D4F4;"></span>Pre-rebrand</span>
    <span><span class="legend-dot" style="background:#3266ad;"></span>Post-rebrand</span>
  </div>
  <div class="chart-wrap">
    <canvas id="mainChart" role="img" aria-label="Bar chart comparing customers, average order value, and total sales before and after the rebrand.">Comparison of pre and post rebrand metrics.</canvas>
  </div>

  <hr class="divider">

  <p class="section-label">Key insights</p>
  <div class="insight-grid" id="insights"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const data = {
  new: {
    post: { customers: 810, aov: 142.21, sales: 118143.65 },
    pre:  { customers: 909, aov: 140.919, sales: 129213.52 },
    deltas: { customers: -6.25, aov: 0.308, sales: -4.45 }
  },
  returning: {
    post: { customers: 596, aov: 118.79, sales: 76179.75 },
    pre:  { customers: 595, aov: 127.273, sales: 79535.42 },
    deltas: { customers: 6.62, aov: -5.55, sales: -3.33 }
  }
};

const insights = {
  new: [
    { badge: 'warn', title: 'New customer acquisition dropped', body: 'Down 99 customers (−6.25%). The rebrand may have disrupted paid/organic acquisition channels or created a period of brand confusion.' },
    { badge: 'ok',   title: 'Average order value held firm',   body: 'AOV rose slightly (+$0.31 / +0.3%). New visitors who did convert were spending as much as before — intent quality was maintained.' },
    { badge: 'warn', title: 'Revenue impact from fewer arrivals', body: 'Total sales fell by ~$11k (−4.45%), driven purely by lower customer volume, not by lower spend per head.' },
    { badge: 'ok',   title: 'Conversion quality is intact',    body: 'With AOV stable, the drop is a top-of-funnel problem. Focus on awareness and traffic recovery rather than on-site experience.' }
  ],
  returning: [
    { badge: 'ok',   title: 'Loyal customers came back',       body: 'Volume nearly flat (+1 customer). Existing customers found and recognised the new brand, showing rebrand awareness was effective for them.' },
    { badge: 'warn', title: 'Returning customers spent less per order', body: 'AOV fell from $127.27 to $118.79 (−5.55%), suggesting hesitancy or a shift in product mix post-rebrand.' },
    { badge: 'warn', title: 'Returning revenue slipped slightly', body: 'Total sales down ~$3.4k (−3.33%), almost entirely driven by the lower AOV since headcount was stable.' },
    { badge: 'ok',   title: 'Retention is the bright spot',    body: 'Keeping existing customers through a rebrand is the hardest part. Virtually zero churn here is a strong signal of brand trust.' }
  ]
};

let chart = null;
let seg = 'new';

function fmt(n, type) {
  if (type === 'currency') return '$' + n.toLocaleString('en-US', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
  return n.toLocaleString('en-GB');
}

function setSegment(s) {
  seg = s;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.textContent.toLowerCase().includes(s)));
  renderCards(); renderChart(); renderInsights();
}

function renderCards() {
  const d = data[seg];
  const cards = [
    { label: 'Customers (post)',       val: fmt(d.post.customers, 'count'),    delta: d.deltas.customers },
    { label: 'Avg order value (post)', val: '$' + d.post.aov.toFixed(2),       delta: d.deltas.aov },
    { label: 'Total sales (post)',     val: fmt(d.post.sales, 'currency'),     delta: d.deltas.sales }
  ];
  document.getElementById('stat-cards').innerHTML = cards.map(c => `
    <div class="card">
      <p class="card-label">${c.label}</p>
      <p class="card-val">${c.val}</p>
      <p class="card-delta ${c.delta >= 0 ? 'up' : 'down'}">${c.delta > 0 ? '+' : ''}${c.delta.toFixed(2)}% vs pre</p>
    </div>`).join('');
}

function renderChart() {
  const d = data[seg];
  const labels   = ['Customers', 'Avg order value ($)', 'Total sales ($00s)'];
  const preVals  = [d.pre.customers,  d.pre.aov,  d.pre.sales  / 100];
  const postVals = [d.post.customers, d.post.aov, d.post.sales / 100];
  if (chart) chart.destroy();
  chart = new Chart(document.getElementById('mainChart'), {
    type: 'bar',
    data: {
      labels,
      datasets: [
        { label: 'Pre-rebrand',  data: preVals,  backgroundColor: '#B5D4F4', borderRadius: 4 },
        { label: 'Post-rebrand', data: postVals, backgroundColor: '#3266ad', borderRadius: 4 }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { grid: { display: false }, ticks: { color: '#888780' } },
        y: { grid: { color: 'rgba(136,135,128,0.15)' }, ticks: { color: '#888780' } }
      }
    }
  });
}

function renderInsights() {
  document.getElementById('insights').innerHTML = insights[seg].map(i => `
    <div class="insight-card">
      <span class="badge badge-${i.badge}">${i.badge === 'ok' ? 'Positive' : 'Watch'}</span>
      <p class="insight-title">${i.title}</p>
      <p class="insight-body">${i.body}</p>
    </div>`).join('');
}

renderCards(); renderChart(); renderInsights();
</script>
</body>
</html>
